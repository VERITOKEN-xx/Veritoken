name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-
      - name: Clippy (all workspace crates, host target)
        run: cargo clippy --all --all-targets -- -D warnings

  test:
    name: Tests – ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - compliance-engine
          - kyc-registry
          - rwa-token
          - invoice-token
          - property-token
          - carbon-credit-token
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ matrix.crate }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-${{ matrix.crate }}-
      - name: Run contract tests with testutils
        run: cargo test --features testutils -p ${{ matrix.crate }}

  build-wasm:
    name: Build WASM – ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - compliance-engine
          - kyc-registry
          - rwa-token
          - invoice-token
          - property-token
          - carbon-credit-token
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ matrix.crate }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-${{ matrix.crate }}-
      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown -p ${{ matrix.crate }}
      - name: Check WASM sizes
        env:
          # Maximum allowed size per WASM binary, in bytes (128 KB).
          # Adjust this if legitimate contract growth approaches the limit.
          MAX_WASM_BYTES: 131072
        run: |
          set -euo pipefail
          wasm_dir="target/wasm32-unknown-unknown/release"
          shopt -s nullglob
          wasm_files=("$wasm_dir"/*.wasm)
          if [ ${#wasm_files[@]} -eq 0 ]; then
            echo "No .wasm files found in $wasm_dir" >&2
            exit 1
          fi
          oversized=0
          for wasm in "${wasm_files[@]}"; do
            size=$(wc -c < "$wasm")
            if [ "$size" -gt "$MAX_WASM_BYTES" ]; then
              echo "::error::$(basename "$wasm") is ${size} bytes (limit ${MAX_WASM_BYTES} bytes)"
              oversized=1
            else
              echo "$(basename "$wasm"): ${size} bytes (limit ${MAX_WASM_BYTES} bytes)"
            fi
          done
          if [ "$oversized" -ne 0 ]; then
            echo "One or more WASM binaries exceed the ${MAX_WASM_BYTES}-byte limit." >&2
            exit 1
          fi

  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-integration-
      - name: Build all WASM binaries
        run: |
          for crate in compliance-engine kyc-registry rwa-token invoice-token property-token carbon-credit-token; do
            cargo build --release --target wasm32-unknown-unknown -p $crate
          done
      - name: Start Stellar quickstart node
        run: docker compose up -d
      - name: Wait for Stellar node to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/soroban/rpc > /dev/null 2>&1; then
              echo "Node is ready"
              break
            fi
            echo "Waiting for node... ($i/30)"
            sleep 2
          done
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/integration/package.json
      - name: Install integration test dependencies
        working-directory: tests/integration
        run: npm install
      - name: Run integration tests
        working-directory: tests/integration
        run: npm test
        env:
          STELLAR_RPC_URL: http://localhost:8000/soroban/rpc
      - name: Stop Stellar quickstart node
        if: always()
        run: docker compose down

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        id: cache-cargo-audit
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-0.21
      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-audit-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-audit-registry-
      - name: Run security audit
        run: cargo audit
