name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Stellar CLI
        run: cargo install stellar-cli --locked

      - name: Build contracts
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Optimize WASMs and verify sizes
        run: |
          set -euo pipefail
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            [ -f "$wasm" ] || continue
            size_before=$(wc -c < "$wasm")
            echo "==> Optimizing $(basename $wasm) (before: ${size_before} bytes)"
            stellar contract optimize --wasm "$wasm"
            size_after=$(wc -c < "$wasm")
            echo "    After: ${size_after} bytes (saved $((size_before - size_after)) bytes)"
          done

      - name: Run tests
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings -D clippy::unwrap_used
